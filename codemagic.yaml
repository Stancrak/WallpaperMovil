###############################################################
# codemagic.yaml  –  WallpaperMovil
#
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-android-app/
###############################################################

workflows:
  # ── Debug build ──────────────────────────────────────────────────────────
  android-debug:
    name: WallpaperMovil – Debug APK
    max_build_duration: 30

    environment:
      java: 17

    scripts:
      - name: Generate local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Download gradle-wrapper.jar
        script: |
          curl -fL "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o "$CM_BUILD_DIR/gradle/wrapper/gradle-wrapper.jar"

      - name: Make Gradle wrapper executable
        script: chmod +x "$CM_BUILD_DIR/gradlew"

      - name: Build Debug APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - kevinstanly2000@gmail.com
        notify:
          success: true
          failure: true

  # ── Release build ─────────────────────────────────────────────────────────
  # El APK de release se firma con el debug keystore por defecto.
  # Para firmarlo con tu propio keystore:
  #   1. Sube tu .jks en Codemagic → App Settings → Code signing → Android keystores
  #   2. Nómbralo: wallpapermovil_keystore
  #   3. Descomenta el bloque android_signing de abajo
  android-release:
    name: WallpaperMovil – Release APK
    max_build_duration: 60

    environment:
      java: 17
      # android_signing:          # ← Descomenta cuando tengas el keystore listo
      #   - wallpapermovil_keystore

    scripts:
      - name: Generate local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Download gradle-wrapper.jar
        script: |
          curl -fL "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o "$CM_BUILD_DIR/gradle/wrapper/gradle-wrapper.jar"

      - name: Make Gradle wrapper executable
        script: chmod +x "$CM_BUILD_DIR/gradlew"

      - name: Build Release APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleRelease --stacktrace

    artifacts:
      - app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - kevinstanly2000@gmail.com
        notify:
          success: true
          failure: true
