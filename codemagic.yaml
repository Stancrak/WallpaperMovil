###############################################################
# codemagic.yaml  –  WallpaperMovil
#
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-android-app/
#
# HOW TO USE:
# 1. Push this project to a Git repository (GitHub / GitLab / Bitbucket).
# 2. Connect the repo to Codemagic (https://codemagic.io).
# 3. For release builds, add a Code Signing keystore under
#    App Settings → Code signing → Android keystores.
#    Name the keystore entry: wallpapermovil_keystore
# 4. Trigger a build — Codemagic reads this file automatically.
###############################################################

workflows:
  # ── Debug build (no signing required) ───────────────────────────────────
  android-debug:
    name: WallpaperMovil – Debug APK
    max_build_duration: 30 # minutes

    environment:
      java: 17 # Codemagic's pre-installed JDK 17
      # No android_signing block needed for debug builds

    scripts:
      - name: Generate local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make Gradle wrapper executable
        script: chmod +x "$CM_BUILD_DIR/gradlew"

      - name: Build Debug APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/mapping/debug/mapping.txt

    publishing:
      email:
        recipients:
          - tu_email@ejemplo.com # ← Cambia a tu correo
        notify:
          success: true
          failure: true

  # ── Release build (signed APK) ───────────────────────────────────────────
  android-release:
    name: WallpaperMovil – Release APK (Signed)
    max_build_duration: 60

    environment:
      java: 17
      # Reference the keystore you uploaded to Codemagic.
      # This auto-sets: CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD,
      #                 CM_KEY_ALIAS, CM_KEY_PASSWORD
      android_signing:
        - wallpapermovil_keystore

    scripts:
      - name: Generate local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make Gradle wrapper executable
        script: chmod +x "$CM_BUILD_DIR/gradlew"

      - name: Build Release APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleRelease --stacktrace

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - tu_email@ejemplo.com # ← Cambia a tu correo
        notify:
          success: true
          failure: true
